
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>10000天纪念日</title>
<style>
*{box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:#f5f5f7; margin:0; padding:40px 20px; max-width:480px; margin:0 auto;}
.card{background:white; border-radius:20px; padding:30px; box-shadow:0 4px 20px rgba(0,0,0,0.05)}
h2{text-align:center; color:#333; margin-top:0}
.input-area{margin:25px 0}
label{display:block; margin-bottom:8px; color:#555; font-size:15px}
input{width:100%; padding:14px 16px; border:1px solid #ddd; border-radius:12px; font-size:16px; outline:none}
input:focus{border-color:#07c160}
button{width:100%; padding:15px; background:#07c160; color:white; border:none; border-radius:14px; font-size:17px; font-weight:bold; margin-top:10px}
.result{margin-top:30px; text-align:center; font-size:22px; color:#07c160; font-weight:bold; min-height:30px}
.tip{text-align:center; color:#999; font-size:13px; margin-top:15px}
</style>
</head>
<body>
<div class="card">
  <h2>🎂 人生10000天计算器</h2>
  <div class="input-area">
    <label>选择出生日期</label>
    <input type="date" id="birth">
  </div>
  <button onclick="calc()">计算 10000 天纪念日</button>
  <div class="result" id="res"></div>
  <div class="tip">微信内直接打开使用，无需下载</div>
</div>

<script>
function calc(){
  const birth = document.getElementById('birth').value
  if(!birth){alert('请选择出生日期'); return}
  const d = new Date(birth)
  d.setDate(d.getDate() + 10000)
  const y = d.getFullYear()
  const m = String(d.getMonth()+1).padStart(2,'0')
  const day = String(d.getDate()).padStart(2,'0')
  document.getElementById('res').innerText = `🎉 ${y}-${m}-${day}`
}
</script>
</body>
</html>
