<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>10000天纪念日计算器</title>
<style>
body{font-family:微软雅黑; max-width:400px; margin:50px auto; text-align:center; font-size:18px;}
input{padding:10px; font-size:16px; width:220px; margin:10px 0;}
button{padding:10px 20px; background:#4285f4; color:white; border:none; border-radius:5px; cursor:pointer;}
.result{margin-top:20px; font-size:22px; color:#d81b60; font-weight:bold;}
</style>
</head>
<body>
<h2>🎂 出生10000天计算器</h2>
<input type="date" id="birth">
<br>
<button onclick="calc()">计算我的10000天</button>
<div class="result" id="res"></div>

<script>
function calc(){
  let b = document.getElementById('birth').value;
  if(!b){alert('请选择出生日期'); return;}
  let d = new Date(b);
  d.setDate(d.getDate() + 10000);
  let y = d.getFullYear();
  let m = (d.getMonth()+1).toString().padStart(2,'0');
  let day = d.getDate().toString().padStart(2,'0');
  document.getElementById('res').innerText = `🎉 ${y}-${m}-${day}`;
}
</script>
</body>
</html>
